<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketTracker Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .price-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 20px; border-radius: 15px; margin-top: 15px; border: 1px solid #334155; text-align: center; }
        .price-val { font-size: 32px; font-weight: bold; color: #22c55e; margin: 10px 0; }
        .news-box { background: var(--card); border-radius: 12px; padding: 15px; margin-top: 20px; border-left: 4px solid var(--accent); }
        .news-item { padding: 10px 0; border-bottom: 1px solid #334155; }
        .news-title { color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 500; display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h3>MarketTracker v2.0</h3>
        <div style="font-size: 12px; color: #22c55e;">● LIVE</div>
    </div>

    <div class="price-card">
        <div style="color: #94a3b8;">Apple Inc. (AAPL)</div>
        <div id="price-display" class="price-val">Updating...</div>
    </div>

    <div class="news-box">
        <h4 style="margin: 0 0 10px 0;">📰 Top Market Stories</h4>
        <div id="news-container">Loading news...</div>
    </div>

    <script>
        const API_URL = "https://market-proxy-dop7.onrender.com";

        async function refreshData() {
            try {
                // Fetch Stock
                const sRes = await fetch(`${API_URL}/stock/AAPL`);
                const sData = await sRes.json();
                document.getElementById('price-display').innerText = "$" + sData.chart.result[0].meta.regularMarketPrice;

                // Fetch News
                const nRes = await fetch(`${API_URL}/news`);
                const nData = await nRes.json();
                if (nData.length > 0) {
                    document.getElementById('news-container').innerHTML = nData.map(n => `
                        <div class="news-item">
                            <a href="${n.link}" target="_blank" class="news-title">${n.title}</a>
                            <span style="font-size: 10px; color: #64748b;">${n.source}</span>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('news-container').innerText = "No news at the moment.";
                }
            } catch (e) { console.log("Update failed"); }
        }

        refreshData();
        setInterval(refreshData, 30000); // 30 seconds refresh
    </script>
</body>
</html>
