<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Monitor Pro - Full Proof</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #080b10; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .app-shell { max-width: 450px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; border-left: 1px solid #1a1a1a; border-right: 1px solid #1a1a1a; background: #080b10; }
        .scroll-container { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
        .scroll-container::-webkit-scrollbar { width: 0px; }
        .active-tab { color: #3b82f6; border-top: 2px solid #3b82f6; font-weight: 800; }
        .modal-overlay { position: absolute; inset: 0; z-index: 100; background: #080b10; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const App = () => {
            const [isLocked, setIsLocked] = useState(true);
            const [pin, setPin] = useState("");
            const [activeTab, setActiveTab] = useState("INDICES");
            const [selectedStock, setSelectedStock] = useState(null);
            const [showChart, setShowChart] = useState(false);
            const [isBuying, setIsBuying] = useState(false);
            const [isSelling, setIsSelling] = useState(false);
            
            // --- DATA STATE ---
            const [indices] = useState([
                { s: "NIFTY 50", p: 22023, cp: 0.85, up: true, o: 21980, pc: 21841, h: 22100, l: 21950, wh: 22124, wl: 18837, type: 'idx' },
                { s: "SENSEX", p: 72612, cp: 0.72, up: true, o: 72500, pc: 72161, h: 72800, l: 72400, wh: 73427, wl: 62853, type: 'idx' }
            ]);

            const [watchlist] = useState([
                { s: "RELIANCE", n: "Reliance Ind.", p: 2985, cp: 1.45, up: true, o: 2950, pc: 2955, h: 3000, l: 2940, wh: 3024, wl: 2200, v: "5.4M", pe: 26.4 },
                { s: "TCS", n: "Tata Consultancy", p: 4120, cp: -0.80, up: false, o: 4150, pc: 4155, h: 4160, l: 4100, v: "2.1M", pe: 31.2, wh: 4254, wl: 3070 }
            ]);

            const [portfolio, setPortfolio] = useState([
                { id: 1, s: "INFY", n: "Infosys Ltd", q: 10, buy: 1550, p: 1620, o: 1610, pc: 1605, h: 1630, l: 1600, v: "1.2M", pe: 28, wh: 1733, wl: 1185 }
            ]);

            const [pnlHistory, setPnlHistory] = useState([]);

            // --- SORTING STATE ---
            const [sortConfig, setSortConfig] = useState({ key: 's', direction: 1 });

            const sortedData = (data) => {
                return [...data].sort((a, b) => {
                    if (a[sortConfig.key] < b[sortConfig.key]) return -1 * sortConfig.direction;
                    if (a[sortConfig.key] > b[sortConfig.key]) return 1 * sortConfig.direction;
                    return 0;
                });
            };

            // --- HANDLERS ---
            const handlePin = (val) => {
                const newPin = pin + val;
                setPin(newPin);
                if (newPin === "1234") { setIsLocked(false); setPin(""); }
                else if (newPin.length >= 4) setPin("");
            };

            const executeBuy = (qty) => {
                const newEntry = { ...selectedStock, id: Date.now(), q: qty, buy: selectedStock.p, date: new Date().toLocaleDateString() };
                setPortfolio([...portfolio, newEntry]);
                setIsBuying(false);
                setSelectedStock(null);
            };

            const executeSell = (qty) => {
                const profit = (selectedStock.p - selectedStock.buy) * qty;
                setPnlHistory([{ s: selectedStock.s, profit, date: new Date().toLocaleDateString(), q: qty }, ...pnlHistory]);
                setPortfolio(portfolio.filter(item => item.id !== selectedStock.id));
                setIsSelling(false);
                setSelectedStock(null);
            };

            // --- LOCK SCREEN ---
            if (isLocked) {
                return (
                    <div className="app-shell items-center justify-center p-10 text-center">
                        <h1 className="text-3xl font-black text-blue-500 italic mb-10 tracking-tighter">TRADE MONITOR</h1>
                        <div className="flex gap-4 mb-12">
                            {[1,2,3,4].map(i => <div key={i} className={`w-3 h-3 rounded-full ${pin.length >= i ? 'bg-blue-500' : 'bg-gray-800'}`}></div>)}
                        </div>
                        <div className="grid grid-cols-3 gap-6">
                            {[1,2,3,4,5,6,7,8,9,0].map(n => (
                                <button key={n} onClick={() => handlePin(n)} className="w-16 h-16 bg-gray-900 rounded-full text-xl font-bold active:bg-blue-600 active:scale-90 transition-all">{n}</button>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="app-shell">
                    {/* Header */}
                    <header className="p-4 border-b border-gray-900 flex justify-between items-center bg-[#080b10] z-10">
                        <h1 className="text-xl font-bold text-blue-500 italic tracking-tighter">{activeTab}</h1>
                        <div className="w-8 h-8 bg-blue-600/20 rounded-full border border-blue-500/30 flex items-center justify-center text-[10px] font-bold">ST</div>
                    </header>

                    {/* Sorting Bar */}
                    {["INDICES", "WATCHLIST", "PORTFOLIO"].includes(activeTab) && (
                        <div className="flex gap-2 p-3 bg-gray-900/30 border-b border-gray-900">
                            <button onClick={() => setSortConfig({key: 's', direction: sortConfig.direction * -1})} className="flex-1 py-2 bg-gray-800 rounded-lg text-[10px] font-bold text-gray-400 border border-gray-700 uppercase">Name A-Z</button>
                            <button onClick={() => setSortConfig({key: 'p', direction: sortConfig.direction * -1})} className="flex-1 py-2 bg-gray-800 rounded-lg text-[10px] font-bold text-gray-400 border border-gray-700 uppercase">Price L/H</button>
                        </div>
                    )}

                    {/* Main Content */}
                    <div className="scroll-container">
                        {activeTab === "INDICES" && sortedData(indices).map((item, i) => (
                            <StockCard key={i} item={item} onClick={() => setSelectedStock(item)} />
                        ))}

                        {activeTab === "WATCHLIST" && sortedData(watchlist).map((item, i) => (
                            <StockCard key={i} item={item} onClick={() => setSelectedStock(item)} />
                        ))}

                        {activeTab === "PORTFOLIO" && (
                            <div className="space-y-4">
                                <PortfolioSummary data={portfolio} />
                                {sortedData(portfolio).map((item, i) => (
                                    <div key={i} onClick={() => setSelectedStock({...item, isPort: true})} className="bg-gray-900 p-4 rounded-xl border border-gray-800 cursor-pointer">
                                        <div className="flex justify-between items-start">
                                            <p className="font-bold text-blue-400">{item.s}</p>
                                            <p className={`font-bold ${(item.p - item.buy) >= 0 ? 'text-green-500' : 'text-red-500'}`}>
                                                ₹{((item.p - item.buy) * item.q).toLocaleString()}
                                            </p>
                                        </div>
                                        <div className="flex justify-between text-[10px] text-gray-500 mt-2 font-bold uppercase">
                                            <span>Qty: {item.q} | Avg: ₹{item.buy}</span>
                                            <span>LTP: ₹{item.p}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === "P&L" && (
                            <div className="space-y-4">
                                <div className="bg-gray-900 p-8 rounded-2xl border border-green-500/20 text-center">
                                    <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Total Realized Profit</p>
                                    <p className="text-4xl font-black text-green-500 mt-2 italic">₹{pnlHistory.reduce((a,c) => a+c.profit, 0).toLocaleString()}</p>
                                </div>
                                {pnlHistory.map((h, i) => (
                                    <div key={i} className="p-4 bg-gray-900 rounded-xl border border-gray-800 flex justify-between">
                                        <div><p className="font-bold text-sm">{h.s} ({h.q} Qty)</p><p className="text-[10px] text-gray-500">{h.date}</p></div>
                                        <p className="text-green-500 font-bold">+₹{h.profit}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === "SETTINGS" && (
                            <div className="space-y-3">
                                <div className="bg-gray-900 p-4 rounded-xl border border-gray-800 flex items-center gap-4">
                                    <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-black text-xl italic">ST</div>
                                    <div><p className="font-bold">Sahaj Thakkar</p><p className="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Premium Member</p></div>
                                </div>
                                {["Security Settings", "Notification Prefs", "App Theme", "Contact Support"].map(s => (
                                    <div key={s} className="p-4 bg-gray-900 rounded-xl flex justify-between border border-gray-800 text-sm font-bold"><span>{s}</span><span className="text-gray-600">❯</span></div>
                                ))}
                                <button onClick={() => setIsLocked(true)} className="w-full mt-6 py-4 bg-red-900/20 border border-red-900/30 text-red-500 font-bold rounded-xl active:scale-95 transition-all">LOGOUT SYSTEM</button>
                            </div>
                        )}
                    </div>

                    {/* Bottom Nav */}
                    <nav className="h-16 border-t border-gray-900 flex justify-around items-center bg-[#080b10] absolute bottom-0 w-full z-10">
                        {["INDICES", "WATCHLIST", "PORTFOLIO", "P&L", "SETTINGS"].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`text-[9px] font-black tracking-tighter transition-all ${activeTab === t ? 'active-tab px-2' : 'text-gray-600'}`}>{t}</button>
                        ))}
                    </nav>

                    {/* Stock Detail Modal */}
                    {selectedStock && (
                        <div className="modal-overlay p-6 scroll-container">
                            <button onClick={() => setSelectedStock(null)} className="mb-4 bg-gray-900 px-4 py-2 rounded-lg font-bold text-gray-500 text-xs">✕ CLOSE</button>
                            <div className="flex justify-between items-center mb-8">
                                <div><h2 className="text-3xl font-black text-blue-500 italic uppercase tracking-tighter">{selectedStock.s}</h2><p className="text-[10px] text-gray-500 font-bold uppercase">{selectedStock.n || 'Market Index'}</p></div>
                                <div className="text-right"><p className="text-2xl font-bold italic">₹{selectedStock.p}</p><p className={`font-bold text-xs ${selectedStock.cp >= 0 ? 'text-green-500' : 'text-red-500'}`}>{selectedStock.cp}% Today</p></div>
                            </div>

                            <div className="grid grid-cols-2 gap-3 mb-6">
                                <StatItem label="Open" val={selectedStock.o} />
                                <StatItem label="Prev Close" val={selectedStock.pc} />
                                <StatItem label="Today High" val={selectedStock.h} color="text-green-400" />
                                <StatItem label="Today Low" val={selectedStock.l} color="text-red-400" />
                                <StatItem label="52W High" val={selectedStock.wh} />
                                <StatItem label="52W Low" val={selectedStock.wl} />
                            </div>

                            <button onClick={() => setShowChart(true)} className="w-full bg-gray-800 py-4 rounded-xl border border-gray-700 font-bold text-blue-400 text-sm mb-4">VIEW ANALYTICS CHART 📊</button>
                            
                            {selectedStock.type !== 'idx' && !selectedStock.isPort && (
                                <button onClick={() => setIsBuying(true)} className="w-full bg-blue-600 py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-900/20 active:scale-95 transition-all">BUY STOCK</button>
                            )}
                            
                            {selectedStock.isPort && (
                                <button onClick={() => setIsSelling(true)} className="w-full bg-red-600 py-5 rounded-2xl font-black text-lg shadow-xl shadow-red-900/20 active:scale-95 transition-all uppercase">Sell Position</button>
                            )}
                        </div>
                    )}

                    {/* Full Chart Window */}
                    {showChart && (
                        <div className="fixed inset-0 bg-[#080b10] z-[150] p-6 flex flex-col">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-xl font-black text-blue-500 italic uppercase">{selectedStock?.s} CHART</h3>
                                <button onClick={() => setShowChart(false)} className="bg-gray-800 px-6 py-2 rounded-full font-bold text-xs">EXIT</button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto pb-4 scroll-container shrink-0">
                                {["5m","15m","1H","1D","1W","1M"].map(tf => (
                                    <button key={tf} className={`px-4 py-2 rounded-lg text-xs font-bold ${tf === "1D" ? "bg-blue-600" : "bg-gray-800 text-gray-500"}`}>{tf}</button>
                                ))}
                            </div>
                            <div className="flex-1 bg-gray-900/50 rounded-3xl border border-gray-800 flex items-center justify-center relative overflow-hidden">
                                <svg viewBox="0 0 1000 400" className="w-full h-48 stroke-blue-500 fill-none opacity-80">
                                    <path d="M0,350 L100,320 L250,380 L400,150 L600,280 L800,50 L1000,120" strokeWidth="4" />
                                </svg>
                            </div>
                        </div>
                    )}

                    {/* Buy Modal */}
                    {isBuying && <TradeModal type="BUY" stock={selectedStock} onCancel={() => setIsBuying(false)} onConfirm={executeBuy} />}
                    {/* Sell Modal */}
                    {isSelling && <TradeModal type="SELL" stock={selectedStock} onCancel={() => setIsSelling(false)} onConfirm={executeSell} />}
                </div>
            );
        };

        // --- SUB COMPONENTS ---
        const StockCard = ({ item, onClick }) => (
            <div onClick={onClick} className="bg-gray-900 p-4 rounded-xl flex justify-between items-center border border-gray-800 mb-3 cursor-pointer active:bg-gray-800">
                <div><p className="font-bold tracking-tight">{item.s}</p><p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">{item.n || 'Index'}</p></div>
                <div className="text-right"><p className="font-bold">₹{item.p.toLocaleString()}</p><p className={`text-[10px] font-bold ${item.cp >= 0 ? 'text-green-500' : 'text-red-500'}`}>{item.cp}%</p></div>
            </div>
        );

        const PortfolioSummary = ({ data }) => {
            const invested = data.reduce((a,c) => a + (c.buy * c.q), 0);
            const current = data.reduce((a,c) => a + (c.p * c.q), 0);
            const pnl = current - invested;
            return (
                <div className="bg-blue-600/10 p-5 rounded-2xl border border-blue-500/20 mb-6 shadow-2xl">
                    <div className="flex justify-between text-[9px] font-black text-blue-400 uppercase tracking-widest">
                        <span>Invested: ₹{invested.toLocaleString()}</span>
                        <span>Current: ₹{current.toLocaleString()}</span>
                    </div>
                    <p className="text-[10px] text-gray-500 mt-4 font-black uppercase tracking-widest">Total Unrealized P&L</p>
                    <p className={`text-3xl font-black italic tracking-tighter ${pnl >= 0 ? 'text-green-400' : 'text-red-500'}`}>
                        {pnl >= 0 ? '+' : ''}₹{pnl.toLocaleString()}
                    </p>
                </div>
            );
        };

        const StatItem = ({ label, val, color = "text-white" }) => (
            <div className="bg-gray-900 p-3 rounded-xl border border-gray-800">
                <p className="text-[9px] text-gray-500 font-bold uppercase tracking-tighter mb-1">{label}</p>
                <p className={`font-bold text-sm ${color}`}>₹{val?.toLocaleString()}</p>
            </div>
        );

        const TradeModal = ({ type, stock, onCancel, onConfirm }) => {
            const [q, setQ] = useState(10);
            return (
                <div className="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-8">
                    <div className="bg-gray-900 w-full p-6 rounded-3xl border border-gray-700">
                        <h3 className={`text-xl font-black text-center mb-6 italic ${type === 'BUY' ? 'text-blue-500' : 'text-red-500'}`}>{type} {stock.s}</h3>
                        <div className="space-y-4">
                            <div className="bg-gray-800 p-3 rounded-xl flex justify-between items-center">
                                <span className="text-[10px] text-gray-500 font-bold uppercase">Price</span>
                                <span className="font-bold">₹{stock.p}</span>
                            </div>
                            <div>
                                <p className="text-[10px] text-gray-500 font-bold uppercase mb-2 ml-1">Quantity</p>
                                <input type="number" value={q} onChange={(e) => setQ(e.target.value)} className="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 font-bold outline-none focus:border-blue-500" />
                            </div>
                        </div>
                        <div className="flex gap-3 mt-8">
                            <button onClick={onCancel} className="flex-1 py-4 bg-gray-800 rounded-xl font-bold text-xs uppercase">Cancel</button>
                            <button onClick={() => onConfirm(parseInt(q))} className={`flex-1 py-4 rounded-xl font-bold text-xs uppercase ${type === 'BUY' ? 'bg-blue-600' : 'bg-red-600'}`}>Confirm {type}</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
