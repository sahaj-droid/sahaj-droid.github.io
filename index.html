<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketTracker Debug</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .status-card { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #38bdf8; }
        .error-log { background: #450a0a; color: #fca5a5; padding: 10px; border-radius: 5px; font-size: 12px; margin-top: 10px; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h3>MarketTracker v2.0 - Debug Mode</h3>
    <div id="debug-status" style="font-size: 12px; color: #94a3b8;">Initialising...</div>

    <div class="status-card">
        <strong>Price:</strong> <span id="price-val">Waiting...</span>
    </div>

    <div class="status-card">
        <strong>News:</strong>
        <div id="news-val" style="font-size: 14px; margin-top: 10px;">Waiting...</div>
    </div>

    <div id="error-box" class="error-log"><strong>Logs:</strong><br></div>

    <script>
        const PROXY_URL = "https://market-proxy-dop7.onrender.com";

        function logError(msg) {
            const box = document.getElementById('error-box');
            box.style.display = 'block';
            box.innerHTML += "<div>> " + msg + "</div>";
        }

        async function startApp() {
            document.getElementById('debug-status').innerText = "Connecting to: " + PROXY_URL;
            
            try {
                logError("Fetching Stock...");
                const sRes = await fetch(`${PROXY_URL}/stock/AAPL`);
                if (!sRes.ok) throw new Error("Stock API Error: " + sRes.status);
                const sData = await sRes.json();
                document.getElementById('price-val').innerText = "AAPL: $" + sData.chart.result[0].meta.regularMarketPrice;

                logError("Fetching News...");
                const nRes = await fetch(`${PROXY_URL}/news`);
                if (!nRes.ok) throw new Error("News API Error: " + nRes.status);
                const nData = await nRes.json();
                
                if (nData.length > 0) {
                    document.getElementById('news-val').innerHTML = nData.map(n => 
                        `<div style="margin-bottom:8px;">• <a href="${n.link}" style="color:#38bdf8">${n.title}</a></div>`
                    ).join('');
                } else {
                    document.getElementById('news-val').innerText = "No news found.";
                }

                document.getElementById('debug-status').innerText = "All systems online! ✅";

            } catch (err) {
                logError("CRITICAL: " + err.message);
                document.getElementById('debug-status').innerText = "System Failure ❌";
            }
        }

        // Render ne jagva mate 2 second ni raah jovo
        setTimeout(startApp, 2000);
    </script>
</body>
</html>
