<script>
    // AA LINK DHAYN THI CHECK KARO - NO SLASH AT END
    const API_URL = "https://market-proxy-dop7.onrender.com"; 

    async function updateData() {
        try {
            // Fetch Prices
            const stockRes = await fetch(`${API_URL}/stock/AAPL`);
            const stockData = await stockRes.json();
            document.getElementById('prices').innerText = "AAPL: $" + stockData.chart.result[0].meta.regularMarketPrice;

            // Fetch News
            const newsRes = await fetch(`${API_URL}/news`);
            const newsData = await newsRes.json();
            if(newsData.length > 0) {
                document.getElementById('news-list').innerHTML = newsData.map(n => `
                    <div style="margin-bottom:10px;">
                        <a href="${n.link}" target="_blank" style="color:#38bdf8; text-decoration:none;">${n.title}</a>
                        <div style="font-size:10px; color:#94a3b8;">${n.source}</div>
                    </div>
                `).join('');
            }
        } catch (e) {
            console.error(e);
            document.getElementById('news-list').innerText = "Connection Error.";
        }
    }
    updateData();
    setInterval(updateData, 60000);
</script>
